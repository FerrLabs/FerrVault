# Sync two named secrets from FerrFlow's `production` vault of the `web`
# project into a Kubernetes Secret called `web-env`. The operator refreshes
# every hour (default) and writes results into the same namespace.
apiVersion: ferrflow.io/v1alpha1
kind: FerrFlowSecret
metadata:
  name: web-env
  namespace: default
spec:
  connectionRef:
    name: prod
  project: web
  vault: production
  selector:
    names:
      - DATABASE_URL
      - STRIPE_KEY
  target:
    name: web-env
    type: Opaque
  refreshInterval: 30m
