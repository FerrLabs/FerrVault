name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so GitHub's advisory DB catches up even if the code is
    # idle. Monday 06:00 UTC keeps the report fresh on Monday mornings.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ferrlabs-k8s
    # Skip on release-bot commits to avoid re-scanning identical code twice in
    # a row (the release commit is a one-line changelog diff).
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
