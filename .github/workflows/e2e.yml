name: E2E

# Smoke test that spins up a real Kubernetes cluster (kind), builds the
# operator image locally, installs via the Helm chart, applies sample CRs
# backed by a mocked FerrFlow API, and asserts the reconciler behaves as
# expected end-to-end. Catches bugs that `go build` + `golangci-lint` miss —
# controller-runtime quirks, RBAC gaps, CRD schema errors, etc.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: kind smoke test
    # Skip on release-bot commits — they only bump Chart.yaml metadata, the
    # code that matters has already been tested on the feature branch.
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Check Go project presence
        id: gate
        # Same gate as ci.yml — no point spinning a cluster if the repo is
        # still at scaffolding-only with no go.mod.
        run: |
          if [ -f go.mod ]; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-go@v6
        if: steps.gate.outputs.has_go == 'true'
        with:
          go-version-file: go.mod
          cache: true

      - uses: helm/kind-action@v1
        if: steps.gate.outputs.has_go == 'true'
        with:
          cluster_name: ferrflow-e2e
          # Keep the node image pinned so a kind release doesn't break us.
          node_image: kindest/node:v1.32.2

      - name: Install Helm
        if: steps.gate.outputs.has_go == 'true'
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Download dependencies
        if: steps.gate.outputs.has_go == 'true'
        run: go mod download

      - name: Build operator image into the kind node
        if: steps.gate.outputs.has_go == 'true'
        # `docker build` into the host daemon, then `kind load docker-image`
        # ships it straight to the kind node without a registry round-trip.
        run: |
          docker build -t ferrflow-operator:e2e .
          kind load docker-image ferrflow-operator:e2e --name ferrflow-e2e

      - name: Install the chart
        if: steps.gate.outputs.has_go == 'true'
        run: |
          helm upgrade --install ferrflow-operator charts/ferrflow-operator \
            --namespace ferrflow-operator-system --create-namespace \
            --set image.repository=ferrflow-operator \
            --set image.tag=e2e \
            --set image.pullPolicy=IfNotPresent \
            --set leaderElection.enabled=false \
            --wait --timeout 3m

      - name: Assert manager is Ready
        if: steps.gate.outputs.has_go == 'true'
        run: |
          kubectl wait --for=condition=Available=True deployment/ferrflow-operator \
            --namespace ferrflow-operator-system --timeout=2m
          kubectl get pods -n ferrflow-operator-system -o wide

      - name: Assert CRDs served
        if: steps.gate.outputs.has_go == 'true'
        run: |
          kubectl wait --for=condition=Established=True \
            crd/ferrflowconnections.ferrflow.io \
            crd/ferrflowsecrets.ferrflow.io \
            --timeout=30s

      - name: Apply a CR pointing at a non-existent FerrFlow and watch the reconciler fail gracefully
        if: steps.gate.outputs.has_go == 'true'
        # This validates: the reconciler's full loop runs; CR status transitions
        # to Ready=False with a recognisable reason when the backend isn't
        # reachable. That's strictly better than a raw panic or a stuck
        # reconciliation — and it means the RBAC, owner-refs and auth-loading
        # code paths all executed.
        run: |
          kubectl create namespace demo
          kubectl -n demo create secret generic ferrflow-api-token \
            --from-literal=token=fft_not_a_real_token_just_smoke_testing
          cat <<'CR' | kubectl apply -f -
          apiVersion: ferrflow.io/v1alpha1
          kind: FerrFlowConnection
          metadata:
            name: smoke
            namespace: demo
          spec:
            url: http://ferrflow-does-not-exist.demo.svc.cluster.local
            organization: e2e
            tokenSecretRef:
              name: ferrflow-api-token
              key: token
          ---
          apiVersion: ferrflow.io/v1alpha1
          kind: FerrFlowSecret
          metadata:
            name: web-env
            namespace: demo
          spec:
            connectionRef: { name: smoke }
            project: web
            vault: production
            selector:
              names: [DATABASE_URL]
            target:
              name: web-env
            refreshInterval: 30s
          CR

          # Give the operator a few reconcile cycles to update status.
          for i in $(seq 1 30); do
            ready=$(kubectl -n demo get ferrflowsecret web-env -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            reason=$(kubectl -n demo get ferrflowsecret web-env -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "")
            echo "[${i}/30] Ready=${ready:-<unset>} Reason=${reason:-<unset>}"
            if [ "$ready" = "False" ] && [ -n "$reason" ]; then
              echo "Reconciler reached the failure branch as expected — good."
              exit 0
            fi
            sleep 5
          done

          echo "Timed out waiting for Ready=False — reconciler may be stuck."
          kubectl -n demo describe ferrflowsecret web-env
          kubectl logs -n ferrflow-operator-system -l app.kubernetes.io/name=ferrflow-operator --tail=200
          exit 1

      - name: Dump operator logs on failure
        if: failure() && steps.gate.outputs.has_go == 'true'
        run: |
          echo "=== ferrflow-operator pods ==="
          kubectl get pods -n ferrflow-operator-system -o wide || true
          echo "=== manager logs ==="
          kubectl logs -n ferrflow-operator-system -l app.kubernetes.io/name=ferrflow-operator --tail=500 || true
          echo "=== events in demo ==="
          kubectl get events -n demo --sort-by=.lastTimestamp || true
