{{- if .Values.crds.install -}}
# Source: charts/ferrflow-operator/crds/ferrflow.io_ferrflowsecrets.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
  labels:
    {{- include "ferrflow-operator.labels" . | nindent 4 }}
  name: ferrflowsecrets.ferrflow.io
spec:
  group: ferrflow.io
  names:
    kind: FerrFlowSecret
    listKind: FerrFlowSecretList
    plural: ferrflowsecrets
    singular: ferrflowsecret
    shortNames:
      - ffs
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Vault
          type: string
          jsonPath: .spec.vault
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: LastSynced
          type: date
          jsonPath: .status.lastSyncedAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: { type: string }
            kind:       { type: string }
            metadata:   { type: object }
            spec:
              type: object
              required: [connectionRef, project, vault]
              properties:
                connectionRef:
                  type: object
                  required: [name]
                  properties:
                    name: { type: string }
                project:
                  type: string
                  minLength: 1
                vault:
                  type: string
                  minLength: 1
                selector:
                  type: object
                  properties:
                    names:
                      type: array
                      items: { type: string }
                target:
                  type: object
                  properties:
                    name: { type: string }
                    type: { type: string }
                refreshInterval:
                  type: string
                  default: "1h"
                  description: Go `time.Duration` string. `0s` disables scheduled refresh.
                rolloutRestart:
                  type: array
                  items:
                    type: object
                    required: [kind, name]
                    properties:
                      kind:
                        type: string
                        enum: [Deployment, StatefulSet, DaemonSet]
                      name: { type: string }
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:               { type: string }
                      status:             { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer, format: int64 }
                      lastTransitionTime: { type: string, format: date-time }
                      reason:             { type: string }
                      message:            { type: string }
                lastSyncedAt:
                  type: string
                  format: date-time
                syncedKeys:
                  type: array
                  items: { type: string }
                missingKeys:
                  type: array
                  items: { type: string }
                observedGeneration:
                  type: integer
                  format: int64
{{- end }}
