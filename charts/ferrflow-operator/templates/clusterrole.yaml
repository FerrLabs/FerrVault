{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ferrflow-operator.fullname" . }}
  labels:
    {{- include "ferrflow-operator.labels" . | nindent 4 }}
rules:
  # Full CR access for the operator's own types.
  - apiGroups: ["ferrflow.io"]
    resources: [ferrflowsecrets, ferrflowconnections]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: ["ferrflow.io"]
    resources: [ferrflowsecrets/status, ferrflowconnections/status]
    verbs: [get, update, patch]
  - apiGroups: ["ferrflow.io"]
    resources: [ferrflowsecrets/finalizers, ferrflowconnections/finalizers]
    verbs: [update]

  # Manages the target Secret and reads the referenced token Secret.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch, create, update, patch]

  # Emits Events that show up on `kubectl describe ferrflowsecret …`.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]

  {{- if .Values.leaderElection.enabled }}
  # Leader election lease. Scoped to the release namespace; the operator does
  # not need cluster-wide lease access when it owns one specific lease name.
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  {{- end }}
{{- end }}
