{{- if .Values.crds.install -}}
# Source: charts/ferrflow-operator/crds/ferrflow.io_ferrflowconnections.yaml
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    {{- if .Values.crds.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
  labels:
    {{- include "ferrflow-operator.labels" . | nindent 4 }}
  name: ferrflowconnections.ferrflow.io
spec:
  group: ferrflow.io
  names:
    kind: FerrFlowConnection
    listKind: FerrFlowConnectionList
    plural: ferrflowconnections
    singular: ferrflowconnection
    shortNames:
      - ffc
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: URL
          type: string
          jsonPath: .spec.url
        - name: Org
          type: string
          jsonPath: .spec.organization
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [url, organization, tokenSecretRef]
              properties:
                url:
                  type: string
                  pattern: '^https?://'
                  description: Base URL of the FerrFlow API (without trailing slash).
                organization:
                  type: string
                  minLength: 1
                  description: FerrFlow org slug this connection targets.
                tokenSecretRef:
                  type: object
                  required: [name, key]
                  properties:
                    name: { type: string }
                    key:  { type: string }
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason, message]
                    properties:
                      type:               { type: string }
                      status:             { type: string, enum: ["True", "False", "Unknown"] }
                      observedGeneration: { type: integer, format: int64 }
                      lastTransitionTime: { type: string, format: date-time }
                      reason:             { type: string }
                      message:            { type: string }
                lastCheckedAt:
                  type: string
                  format: date-time
{{- end }}
