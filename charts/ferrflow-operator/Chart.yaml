apiVersion: v2
name: ferrflow-operator
description: Kubernetes operator that syncs secrets from the FerrFlow API into native Kubernetes Secrets.
type: application

# `version` is the chart's own version (bumped on chart-only changes).
# `appVersion` mirrors the operator binary version — both are kept in sync
# automatically by FerrFlow on every release of this repo.
version: "0.1.0"
appVersion: "0.1.0"

kubeVersion: ">=1.28.0-0"

home: https://ferrflow.com
sources:
  - https://github.com/FerrLabs/FerrFlow-Operator
keywords:
  - ferrflow
  - secrets
  - secret-management
  - external-secrets
  - kubernetes-operator

maintainers:
  - name: FerrFlow
    url: https://ferrflow.com

annotations:
  artifacthub.io/license: MPL-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://ferrflow.com/docs
    - name: Source
      url: https://github.com/FerrLabs/FerrFlow-Operator
